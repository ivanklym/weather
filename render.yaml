# Цей файл дозволяє Render автоматично налаштувати все одразу,
# коли ви підключите GitHub-репозиторій (Render сам його знайде).
services:
  - type: web
    name: myportal
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn weather.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: myportal-db
          property: connectionString
databases:
  - name: myportal-db
    plan: free